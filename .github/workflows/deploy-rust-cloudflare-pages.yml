name: Continuous Deployment - Rust + Cloudflare Pages

on:
  workflow_call:
    inputs:
      system-packages:
        description: "Space-separated apt packages required to build the crate (passed to apt-get install). Leave empty for pure-Rust crates."
        type: string
        default: ""
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

concurrency:
  group: deployment-${{ github.repository }}-${{ github.ref_name }}

permissions:
  contents: read

env:
  WASM_TARGET: wasm32-unknown-unknown
  TRUNK_OUTPUT_DIR: dist

jobs:
  deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install system packages
        if: inputs.system-packages != ''
        env:
          PKGS: ${{ inputs.system-packages }}
        run: |
          read -ra PKG_ARR <<< "$PKGS"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "${PKG_ARR[@]}"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ env.WASM_TARGET }}

      - name: Install Brioche
        uses: brioche-dev/setup-brioche@9b82d4ee697500f7d81f6397a943935ffa3d887b # v1.5.0

      - name: Install trunk
        run: brioche install -r trunk

      - name: Cache cargo registry + build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/bin
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
          key: deployment-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            deployment-

      - name: Build
        run: trunk build --locked --release --public-url "/"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.TRUNK_OUTPUT_DIR }} --project-name=${{ github.event.repository.name }} --branch=${{ github.ref_name }}
