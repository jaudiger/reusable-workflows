name: Continuous Deployment - crates.io publish

on:
  workflow_call:
    inputs:
      system-packages:
        description: "Space-separated apt packages required to build the crate (passed to apt-get install). Leave empty for pure-Rust crates."
        type: string
        default: ""
    secrets:
      CRATES_IO_API_TOKEN:
        required: true

concurrency:
  group: deployment-${{ github.repository }}-${{ github.ref_name }}

permissions:
  contents: read

jobs:
  deployment:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install system packages
        if: inputs.system-packages != ''
        env:
          PKGS: ${{ inputs.system-packages }}
        run: |
          read -ra PKG_ARR <<< "$PKGS"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "${PKG_ARR[@]}"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Cache cargo registry + build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/bin
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
          key: deployment-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            deployment-

      - name: Make sure the tag matches Cargo.toml
        run: |
          TAG="${GITHUB_REF##*/}"
          TOML_VERSION="v$(grep -m1 '^version' Cargo.toml | cut -d '"' -f2)"
          if [[ "$TAG" != "$TOML_VERSION" ]]; then
            echo "($TAG) and Cargo.toml ($TOML_VERSION) differ. Please update the tag or Cargo.toml."
            exit 1
          fi

      - name: Publish to crates.io (dry run)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}
        run: cargo publish --locked --verbose --dry-run

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_API_TOKEN }}
        run: cargo publish --locked --verbose
