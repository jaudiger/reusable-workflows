name: Continuous Deployment - Zine + Cloudflare Pages

on:
  workflow_call:
    inputs:
      zine-version:
        description: "Zine release tag to install via kristoff-it/setup-zine."
        type: string
        required: true
      output-dir:
        description: "Build output directory passed to wrangler pages deploy."
        type: string
        default: "public"
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true
      CLOUDFLARE_ACCOUNT_ID:
        required: true

concurrency:
  group: deployment-${{ github.repository }}-${{ github.ref_name }}

permissions:
  contents: read

jobs:
  deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Zine
        uses: kristoff-it/setup-zine@46308d08c1c1316d1927adcc3eaaba8037f10c1e # v1
        with:
          version: ${{ inputs.zine-version }}

      - name: Build
        run: zine release

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ inputs.output-dir }} --project-name=${{ github.event.repository.name }} --branch=${{ github.ref_name }}
