name: Continuous Integration - Static Analysis (Rust)

on:
  workflow_call:
    inputs:
      system-packages:
        description: "Space-separated apt packages required to build the crate (passed to apt-get install). Leave empty for pure-Rust crates."
        type: string
        default: ""

concurrency:
  group: static-analysis-rust-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: "rustfmt"

      - name: Check formatting
        run: cargo fmt --all -- --check

  rust-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, nightly]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install system packages
        if: inputs.system-packages != ''
        env:
          PKGS: ${{ inputs.system-packages }}
        run: |
          read -ra PKG_ARR <<< "$PKGS"
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "${PKG_ARR[@]}"

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: "clippy"

      - name: Cache cargo registry + build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/bin
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            target
          key: rust-static-analysis-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            rust-static-analysis-${{ matrix.toolchain }}-

      - name: Check linting
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
